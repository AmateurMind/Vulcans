<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R2_BaseLink Three.js Demo</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at top, #202938 0%, #0c1119 55%, #05070b 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.35);
        color: #d8e2f2;
        font-size: 13px;
        line-height: 1.4;
        border-radius: 8px;
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud">
      <div><strong>Model:</strong> R2_BaseLink.STL</div>
      <div>Drag to orbit, scroll to zoom</div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.183.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
